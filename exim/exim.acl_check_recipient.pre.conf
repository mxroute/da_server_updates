# Rate limit senders to 400 per hour
deny    authenticated = *
        !condition = ${lookup{$authenticated_id}lsearch{/etc/exim.ratelimit_whitelist}{yes}{no}}
        ratelimit = 400 / 1h / strict / $authenticated_id
        message = Rate limit exceeded: 400 messages per hour for $authenticated_id

# New trend
deny    !authenticated = *
        condition = ${if match{$sender_address_domain}{\N^gmail\.com$\N}}
        condition = ${if match{$sender_address_local_part}{\Nestimat\N}}
        !condition = ${lookup{$sender_address}lsearch{/etc/exim/gmail_estimation_whitelist}{yes}{no}}
        message = Likely spam rejected

# Block Outlook/Hotmail .nic[digits] spam campaign
# Examples seen across the fleet: name.nic@outlook.com, name.nic56@outlook.com.
# This runs at RCPT time, before Subject/body are available.
deny    !authenticated = *
        condition = ${if and {{match{${lc:$sender_address_domain}}{\N^(outlook|hotmail)\.com$\N}} \
                          {match{${lc:$sender_address_local_part}}{\N\.nic[0-9]*$\N}}}{yes}{no}}
        message = Message rejected
        logwrite = Blocked Outlook/Hotmail .nic spam trend: sender=$sender_address from $sender_host_address recipient=$local_part@$domain

# No.
deny    !authenticated = *
        condition = ${if match{$sender_address_domain}{\N\.(bond|space)$\N}}
        !condition = ${lookup{$sender_address_domain}lsearch{/etc/exim/tld_whitelist}{yes}{no}}
        message = Yeah no

# Block common spam local part prefixes
deny    !authenticated = *
        condition = ${if match{${lc:$sender_address_local_part}}{\N^(bluecross|biuecross|cstcco|cocstcspecia|teamsams|fedexitem|aaacourtesy|clubteamsam|samsshoppingteam|samsteam|clubsams|samsclub|omahasample|omahasteak|steaksample|AmericanSecureOnline|aaaroadhelp|cstc|blueshield|b(l|i)uecross|lowes|samsmember|marriot)\N}{yes}{no}}
        message = Message rejected
        logwrite = Blocked sender: $sender_address from $sender_host_address

# Spam trend of the year goes to
deny    condition = ${if match{${lc:$sender_address_domain}}{\N^(try[^.]*ai|go[^.]*ai|my[^.]*ai)\.\N}{yes}{no}}
        message   = Your spam startup has been denied try getting a real job

# Spammers found on Reddit
deny    condition = ${if match{$sender_address_domain}{(loudlion|aerosend)}{yes}{no}}
        message   = Get fucked spammer

# How can you use "?all" in your SPF record and call yourself a real email service? Fine, I'll do your job for you.
deny    condition = ${if and {{eq{$sender_address_domain}{email.cz}} \
                        {!match_ip{$sender_host_address}{77.75.76.0/23:77.75.78.0/23}}}}
        message = Mail from email.cz is only accepted from authorized IP ranges

# Gmail knows what they're doing but we'll be thorough anyway.
deny    condition = ${if and {{eq{$sender_address_domain}{gmail.com}} \
                        {!match_ip{$sender_host_address}{74.125.0.0/16:209.85.128.0/17:108.177.16.0/23:142.250.220.0/23}}}}
        message = Mail from gmail.com is only accepted from authorized IP ranges

# Sent.com is too highly spoofed to use permissive SPF
deny    condition = ${if and {{eq{$sender_address_domain}{sent.com}} \
                        {!match_ip{$sender_host_address}{103.168.172.128/27:202.12.124.128/27}}}}
        message = Mail from sent.com is only accepted from authorized IP ranges

# Nice try fuckers
deny    message   = Envelope sender domain not permitted
        !senders  = /etc/exim/firebaseapp_whitelist
        condition = ${if match{$sender_address_domain}{\N(^|\.)firebaseapp\.com$\N}{yes}{no}}

# Blocking a huge spam trend
deny    !authenticated = *
        senders = !:
        condition = ${if match_domain{$sender_address_domain}{costco.com:em.memberedelivery.com:email.instacart.com:digitalshopcard.costco.com:costco.ca}{no}{yes}}
        condition = ${if match{${lc:$sender_address_local_part}}{\N(c[o0]stc[o0]|tractorsupply|acehardware|aaaroadside)\N}{yes}{no}}
        message = Sender address not accepted
        logwrite = Blocked sender: $sender_address from $sender_host_address

# Nice spammer you have there DreamHost
deny    condition = ${if match{$sender_address_domain}{\Ndreamhostps\.com\N}{yes}{no}}
        message = Go away
        logwrite = Blocked dreamhostps domain: $sender_address_domain from $sender_host_address

# Fuck off .solutions spammers
deny    !authenticated = *
        !hosts = /etc/exim/solutions_whitelist
        condition = ${if match{$sender_helo_name}{\N\.solutions$\N}{yes}{no}}
        message = This message represents a spam trend that matches no non-spam senders
        logwrite = Blocked HELO .solutions: $sender_helo_name from $sender_host_address

# Block documento*.sbs domains
deny    condition = ${if match{$sender_address_domain}{\N^documento.*\.sbs$\N}{yes}{no}}
        message = Go away
        logwrite = Blocked documento*.sbs domain: $sender_address_domain from $sender_host_address

# DDOS Mitigation
deny    condition = ${if >{$rcpt_fail_count}{25}{yes}{no}}
        log_message = "Too many failed RCPT commands from ${sender_host_address}"
        message = "Too many RCPT failures - try later"
        delay = 60s

# Back to your normal programming

# First: Critical security checks and spoofing prevention
# Check domain whitelist
warn    condition = ${lookup{${domain:$sender_address}}lsearch{/etc/exim/susranges_domainwhitelist}{1}{0}}
        set acl_m_domain_whitelisted = 1

# Apply the suspicious range check
deny    !authenticated = *
        !hosts = <; /etc/exim/susranges_whitelist
        !condition = ${if eq{$acl_m_domain_whitelisted}{1}{1}{0}}
        hosts = <; /etc/exim/susranges
        condition = ${lookup{$domain}lsearch{/etc/susranges_protected_domains}{1}{0}}
        logwrite = Rejected suspicious IP: $sender_host_address for protected domain: $domain
        message = Unauthenticated mail not allowed from this range to protected domain, nonspam senders request whitelisting at esf.mxroute.com

deny    senders     = *@paypal.com
        condition   = ${if or{\
                          {match{$sender_helo_name}{\N.*outbound\.protection\.outlook\.com\N}}\
                          {match{$sender_host_name}{\N.*outbound\.protection\.outlook\.com\N}}\
                         }{yes}{no}}
        message     = Suspected PayPal spoofing attempt blocked
        logwrite    = Blocked spoofed PayPal: sender=$sender_address helo=$sender_helo_name host=$sender_host_name from $sender_host_address

deny    message = HELO matches local domain ($sender_helo_name) but sender is not authenticated
        !authenticated = *
        condition = ${if match_domain{$sender_helo_name}{+local_domains}{yes}{no}}
        domains = !+local_domains
        logwrite = HELO_SPOOF: $sender_helo_name from IP $sender_host_address rejected

# Second: Basic relay and authentication checks
deny    message = Relay not permitted
        !authenticated = *
        domains = !+local_domains

# Third: SPF and other protocol-level checks
deny    spf = fail
        !authenticated = *
        message = SPF check failed. $sender_host_address is not authorized to send mail from \
                  ${if def:sender_address_domain \
                       {$sender_address_domain}{$sender_helo_name}}

# Fourth: Pattern-based blocking
deny    message = Blocking non-whitelisted messages from Google Groups
        !authenticated = *
        condition = ${if match{$sender_address}{\N\+bnc\N}{yes}{no}}
        !condition = ${if exists{/etc/exim/googlegroups_whitelist}\
                       {${lookup{${domain:$sender_address}}lsearch{/etc/exim/googlegroups_whitelist}{yes}{no}}}\
                       {no}}
        logwrite = Blocked Google Groups sender: $sender_address

deny    message = Suspicious message pattern rejected
        condition = ${if match{$sender_address}{\N^as[0-9]\+bnc.*@.*\.info$\N}{yes}{no}}
        logwrite = Blocked suspicious sender pattern: $sender_address

deny    !authenticated = *
        condition = ${if or{\
                          {match{${lc:$sender_helo_name}}{googleusercontent}}\
                          {match{${lc:$sender_host_name}}{googleusercontent}}\
                         }}
        message = Google Cloud has conditional access to our SMTP
        logwrite = Googleusercontent attempt - HELO: $sender_helo_name Hostname: $sender_host_name Host: $sender_host_address

# Fifth: Domain-specific rules

deny    !authenticated = *
        condition = ${if match{$sender_address_domain}{\N^ahalab\N}{yes}{no}}
        message = Go fuck yourself spammer
        logwrite = Blocked ahalab domain: sender=$sender_address from $sender_host_address

deny    message = Mail not accepted from default assigned hostnames
        !authenticated = *
        condition = ${if or{\
                      {match{$sender_helo_name}{\N^vps-.*\.vps\.ovh\.(ca|us|net)$\N}}\
                      {match{$sender_host_name}{\N^vps-.*\.vps\.ovh\.(ca|us|net)$\N}}\
                    }{yes}{no}}
        logwrite = Rejected default OVH hostname: helo=$sender_helo_name host=$sender_host_name from $sender_host_address

deny    !authenticated = *
        !hosts = <; /etc/exim/aclwhitelist
        hosts = <; /etc/exim/ovhranges
        condition = ${if match{$sender_helo_name}{\N^mail[0-9]+\.[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)?$\N}{yes}{no}}
        message = Suspicious email trend detected and blocked.
        logwrite = Rejected suspicious OVH host: $sender_host_address with HELO $sender_helo_name

# Sixth: Authentication-related spoofing checks
deny    message = Spoofing domains that you do not own to external recipients not allowed
        authenticated = *
        condition = ${lookup{$sender_address_domain}lsearch{/etc/exim/bannedspoofing}{1}{0}}
        domains = !+local_domains
        !condition = ${if exists{/etc/exim/spoofwhitelist}\
                     {${lookup{${domain:$authenticated_id}}lsearch{/etc/exim/spoofwhitelist}{yes}{no}}}\
                     {no}}
        logwrite = SPOOFCHECK: Blocked spoof attempt sender=$sender_address auth=$authenticated_id rcpt=$local_part@$domain

# Seventh: Miscellaneous blocks
deny    senders     = *@example.com
        message     = Your software claims your sending address is on example.com which is not your domain

deny    senders     = nwildlsearch*@;/etc/exim/spam_senders
        message     = Your sending address has been blocked by admins see mxroutedocs.com for explanation

deny    recipients  = nwildlsearch*@;/etc/exim/spam_recipients
        message     = Your recipient address has been blocked by admins see mxroutedocs.com for explanation

deny    recipients  = nwildlsearch*@;/etc/exim/overquota
        message     = Your recipient has reached their disk quota

deny    condition = ${if match{$sender_helo_name}{(?:^|\.)\mxrouting.net}}
        condition = ${if and {{!eq{$sender_host_address}{::1}} {!eq{$sender_host_address}{127.0.0.1}}}}
        message   = Intentionally vague error message requiring you to contact support

deny    domains = ^example\.com
        message = Sending to domains starting with "example.com" is not allowed.

# Reject mail to .local TLD. RFC 6762 reserves .local for mDNS; it's not a valid
# public email destination. Traffic here is always either misconfiguration or abuse.
deny    condition = ${if match{${lc:$domain}}{\N\.local$\N}{yes}{no}}
        message = Sending to .local TLD is not allowed (reserved for mDNS per RFC 6762)
        logwrite = Blocked .local recipient: $local_part@$domain from $sender_host_address

# Reject recipient domains with no TLD (e.g. localhost, Ubuntu24). These cannot
# be delivered anywhere public and just junk up the queue on their way to bouncing.
deny    condition = ${if match{$domain}{\N^[^.]+$\N}{yes}{no}}
        message = Recipient domain must be a fully qualified name
        logwrite = Blocked TLD-less recipient: $local_part@$domain from $sender_host_address

# Reject envelope sender domains with no TLD (e.g. root@localhost, user@Ubuntu24).
# A message accepted with such a sender has no routable return path; bounces cannot
# be delivered and the message either fails silently or pollutes the queue.
# Null sender (<>) has an empty $sender_address_domain, which does not match this regex.
deny    condition = ${if match{$sender_address_domain}{\N^[^.]+$\N}{yes}{no}}
        message = Envelope sender domain must be a fully qualified name
        logwrite = Blocked TLD-less sender: $sender_address from $sender_host_address

deny    sender_domains = *cloudwaysapps.com
        message = Please use a real sending domain

deny    sender_domains = *.secure.ne.jp
        message = Sender domain blocked

# Eighth: Warning and logging
warn    authenticated = *
        logwrite = SPOOFCHECK: Processing authenticated=$authenticated_id sender=$sender_address recipient=$local_part@$domain

warn    senders = :
        set acl_m0 = 1
        logwrite = BLANKLOG: Blank sender detected, deferring decision

# Ninth: Final specific denials
deny    condition = ${if match{$local_part@$domain}{.*@email\.tst.*}{yes}{no}}
        message = Sending to email.tst domains is not allowed

deny    !sender_domains = nwildlsearch;/etc/exim/onmicrosoft_whitelist
        condition = ${if match{$sender_address}{\N.*onmicrosoft\.com\N}{yes}{no}}
        message = Envelope sender containing onmicrosoft.com is not allowed
        logwrite = Blocked onmicrosoft sender: $sender_address from $sender_host_address ($sender_address_domain)

deny    !authenticated = *
        sender_domains = sendgrid.net
        !condition = ${lookup{$domain}lsearch{/etc/exim/sendgrid_whitelist}{1}{0}}
        message = Sendgrid.net sender domains are only allowed to specific whitelisted recipients
